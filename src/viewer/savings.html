<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Savings — Enterprise Agent Memory</title>
  <link rel="stylesheet" href="/viewer/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="eam-nav">
    <a class="eam-nav-logo" href="/viewer/" aria-label="home">
      <svg viewBox="0 0 256 256" fill="none" aria-hidden="true">
        <path fill="rgb(84,84,84)" d="M 160 88 L 194 34 L 216 0 L 256 0 L 256 40 L 221.5 93.5 L 200 128 L 256 128 L 256 256 L 96 256 L 96 168 L 64.246 220 L 40 256 L 0 256 L 0 216 L 34 162 L 56 128 L 0 128 L 0 0 L 160 0 Z"/>
      </svg>
    </a>
    <nav class="eam-nav-pill">
      <a href="/viewer/savings.html" class="active">Savings</a>
      <a href="/viewer/token-economy.html">Token Economy</a>
      <a href="/viewer/scalability.html">Scalability</a>
      <a href="/viewer/explorer.html">Explorer</a>
      <a href="https://github.com/msftse/enterprise-agent-memory">Repo</a>
    </nav>
  </header>

  <main>
    <section class="eam-card">
      <div class="eam-hero" id="hero-saved">—</div>
      <div class="eam-hero-sub" id="hero-sub">Loading…</div>
    </section>

    <section class="eam-card">
      <h3>Cumulative savings (last 30 days)</h3>
      <canvas id="chart-timeseries" height="80"></canvas>
    </section>

    <section class="eam-grid">
      <div class="eam-card">
        <h3>By actor</h3>
        <table class="eam-table" id="tbl-actors"></table>
      </div>
      <div class="eam-card">
        <h3>Most-recalled memories</h3>
        <table class="eam-table" id="tbl-top"></table>
      </div>
    </section>
  </main>

  <script type="module">
    import { fetchEam, pollEvery, requireKey, mountTenantSwitcher, fmtNumber, fmtUsd, mkLineChart, table } from '/viewer/app.js';
    requireKey();
    mountTenantSwitcher();

    async function refresh() {
      const s = await fetchEam('/api/v1/savings/summary');
      document.getElementById('hero-saved').textContent =
        `Saved ${fmtNumber(s.totalSavedTokens)} tokens ≈ ${fmtUsd(s.totalSavedUsd)}`;
      document.getElementById('hero-sub').textContent =
        `${s.memoryCount} memories · ${s.totalRecalls} recalls · ` +
        `${(s.compressionRatio || 0).toFixed(1)}:1 avg compression`;

      const ts = await fetchEam('/api/v1/savings/timeseries?days=30');
      const labels = ts.buckets.map((b) => b.date);
      let cum = 0;
      const series = ts.buckets.map((b) => (cum += b.savedTokens));
      mkLineChart(document.getElementById('chart-timeseries'), labels, series, 'Cumulative tokens saved');

      const a = await fetchEam('/api/v1/savings/by-actor');
      table(
        document.getElementById('tbl-actors'),
        ['Actor', 'Saved', 'Memories', 'Recalls'],
        a.actors.map((x) => [x.actor, fmtNumber(x.savedTokens), x.memoryCount, x.recallCount]),
      );

      const t = await fetchEam('/api/v1/savings/top-memories?limit=10');
      if (t.items.length === 0) {
        document.getElementById('tbl-top').innerHTML = '<tr><td>No recalls yet — start using memory in Claude Code.</td></tr>';
      } else {
        table(
          document.getElementById('tbl-top'),
          ['×', 'Title'],
          t.items.map((m) => [m.recallCount, m.title]),
        );
      }
    }

    pollEvery(30000, refresh);
  </script>
</body>
</html>
