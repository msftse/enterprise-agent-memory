<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🧠 Enterprise Agent Memory</title>
<script>
  (() => {
    const param = new URLSearchParams(window.location.search).get("clawpilotTheme");
    const theme =
      param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
<style>
:root {
  color-scheme: light;
  --cp-bg: #f7f4ef;
  --cp-bg-elevated: #fcfbf8;
  --cp-surface: #ffffff;
  --cp-surface-soft: #f5f5f5;
  --cp-border: #dedede;
  --cp-border-strong: #919191;
  --cp-text: #242424;
  --cp-text-muted: #5c5c5c;
  --cp-text-soft: #6f6f6f;
  --cp-accent: #b11f4b;
  --cp-accent-hover: #9a1a41;
  --cp-accent-soft: rgba(177, 31, 75, 0.08);
  --cp-accent-fg: #ffffff;
  --cp-success: #16a34a;
  --cp-danger: #dc2626;
  --cp-warning: #f59e0b;
  --cp-link: #0078d4;
  --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.12);
  --cp-overlay: rgba(255, 255, 255, 0.8);
  --cp-panel: rgba(255, 255, 255, 0.86);
  --cp-panel-strong: rgba(255, 255, 255, 0.96);
  --cp-sheen: rgba(255, 255, 255, 0.55);
  --cp-highlight: rgba(177, 31, 75, 0.12);
}
html[data-theme="dark"] {
  color-scheme: dark;
  --cp-bg: #3d3b3a;
  --cp-bg-elevated: #343231;
  --cp-surface: #292929;
  --cp-surface-soft: #2e2e2e;
  --cp-border: #474747;
  --cp-border-strong: #5f5f5f;
  --cp-text: #dedede;
  --cp-text-muted: #919191;
  --cp-text-soft: #b0b0b0;
  --cp-accent: #fd8ea1;
  --cp-accent-hover: #fb7b91;
  --cp-accent-soft: rgba(253, 142, 161, 0.14);
  --cp-accent-fg: #1a1a1a;
  --cp-success: #4ade80;
  --cp-danger: #f87171;
  --cp-warning: #fbbf24;
  --cp-link: #4da6ff;
  --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
  --cp-overlay: rgba(41, 41, 41, 0.88);
  --cp-panel: rgba(41, 41, 41, 0.72);
  --cp-panel-strong: rgba(41, 41, 41, 0.96);
  --cp-sheen: rgba(255, 255, 255, 0.04);
  --cp-highlight: rgba(253, 142, 161, 0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--cp-bg);
  color: var(--cp-text);
  line-height: 1.5;
}

code, pre, .mono {
  font-family: Consolas, "Courier New", Courier, monospace;
}

/* Layout */
.app { display: flex; height: 100vh; overflow: hidden; }

.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--cp-surface);
  border-right: 1px solid var(--cp-border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.sidebar-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--cp-border);
}

.sidebar-header h1 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.sidebar-header .subtitle { font-size: 11px; color: var(--cp-text-muted); margin-top: 2px; }

.nav-section { padding: 12px 8px 4px; }

.nav-section-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--cp-text-muted); padding: 0 8px 4px;
}

.nav-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  border-radius: 0.625rem; cursor: pointer; font-size: 13px;
  color: var(--cp-text-soft); transition: all 0.15s;
  border: none; background: none; width: 100%; text-align: left;
}

.nav-item:hover { background: var(--cp-surface-soft); color: var(--cp-text); }
.nav-item.active { background: var(--cp-accent-soft); color: var(--cp-accent); font-weight: 500; }

.nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
.nav-item .badge {
  margin-left: auto; background: var(--cp-accent-soft); color: var(--cp-accent);
  font-size: 11px; padding: 1px 6px; border-radius: 10px; font-weight: 600;
}

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.config-bar {
  display: flex; align-items: center; gap: 8px; padding: 8px 16px;
  background: var(--cp-surface-soft); border-bottom: 1px solid var(--cp-border); font-size: 12px;
}

.config-bar label { color: var(--cp-text-muted); }

.config-bar input, .config-bar select {
  padding: 4px 8px; border: 1px solid var(--cp-border); border-radius: 0.625rem;
  background: var(--cp-surface); color: var(--cp-text); font-size: 12px; font-family: inherit;
}

.config-bar input:focus, .config-bar select:focus { outline: none; border-color: var(--cp-accent); }

.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot.green { background: var(--cp-success); }
.dot.red { background: var(--cp-danger); }
.dot.yellow { background: var(--cp-warning); }

.content { flex: 1; overflow-y: auto; padding: 24px; }

/* Cards */
.card {
  background: var(--cp-surface); border: 1px solid var(--cp-border); border-radius: 16px;
  padding: 16px; box-shadow: 0 0 2px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.14);
}
.card + .card { margin-top: 12px; }
.card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.card-title { font-size: 14px; font-weight: 600; }

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }

.stat-card {
  background: var(--cp-surface); border: 1px solid var(--cp-border); border-radius: 16px;
  padding: 16px 20px; box-shadow: 0 0 2px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.14);
}
.stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--cp-text-muted); margin-bottom: 4px; }
.stat-card .value { font-size: 28px; font-weight: 700; color: var(--cp-accent); }
.stat-card .sub { font-size: 11px; color: var(--cp-text-soft); margin-top: 2px; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--cp-border); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--cp-text-muted); }
td { padding: 10px 12px; border-bottom: 1px solid var(--cp-border); vertical-align: top; }
tr:hover td { background: var(--cp-surface-soft); }
tr.clickable { cursor: pointer; }

/* Tags */
.tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.tag.active { background: rgba(22,163,74,0.12); color: var(--cp-success); }
.tag.completed { background: var(--cp-accent-soft); color: var(--cp-accent); }
.tag.abandoned { background: rgba(220,38,38,0.12); color: var(--cp-danger); }
.tag.file { background: rgba(0,120,212,0.12); color: var(--cp-link); }
.tag.concept { background: rgba(177,31,75,0.12); color: var(--cp-accent); }
.tag.library { background: rgba(22,163,74,0.12); color: var(--cp-success); }
.tag.person { background: rgba(245,158,11,0.12); color: var(--cp-warning); }
.tag.function { background: rgba(139,92,246,0.12); color: #8b5cf6; }
.tag.error { background: rgba(220,38,38,0.12); color: var(--cp-danger); }
.tag.pattern { background: rgba(6,182,212,0.12); color: #06b6d4; }
.tag.project { background: rgba(139,92,246,0.12); color: #8b5cf6; }
.tag.default { background: var(--cp-surface-soft); color: var(--cp-text-muted); }

/* Buttons */
.btn {
  padding: 6px 14px; border-radius: 0.625rem; border: 1px solid var(--cp-border);
  background: var(--cp-surface); color: var(--cp-text); font-size: 12px;
  font-family: inherit; cursor: pointer; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 4px;
}
.btn:hover { border-color: var(--cp-border-strong); }
.btn.primary { background: var(--cp-accent); color: var(--cp-accent-fg); border-color: var(--cp-accent); }
.btn.primary:hover { background: var(--cp-accent-hover); }

/* Search */
.search-box { display: flex; gap: 8px; margin-bottom: 20px; }
.search-box input {
  flex: 1; padding: 10px 14px; border: 1px solid var(--cp-border); border-radius: 0.625rem;
  background: var(--cp-surface); color: var(--cp-text); font-size: 14px; font-family: inherit;
}
.search-box input:focus { outline: none; border-color: var(--cp-accent); box-shadow: 0 0 0 3px var(--cp-accent-soft); }
.search-box select {
  padding: 10px 12px; border: 1px solid var(--cp-border); border-radius: 0.625rem;
  background: var(--cp-surface); color: var(--cp-text); font-size: 13px; font-family: inherit;
}

/* Results */
.result-card {
  background: var(--cp-surface); border: 1px solid var(--cp-border); border-radius: 16px;
  padding: 16px; margin-bottom: 12px; box-shadow: 0 0 2px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.14);
}
.result-card .result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.result-card .score {
  margin-left: auto; font-size: 12px; font-weight: 600; color: var(--cp-accent);
  background: var(--cp-accent-soft); padding: 2px 8px; border-radius: 10px;
}
.result-card .result-content { font-size: 13px; color: var(--cp-text-soft); line-height: 1.6; }

/* Graph */
.graph-container { background: var(--cp-surface); border: 1px solid var(--cp-border); border-radius: 16px; overflow: hidden; }
.graph-canvas { width: 100%; height: 500px; display: block; }
.graph-legend { display: flex; gap: 12px; padding: 12px 16px; border-top: 1px solid var(--cp-border); flex-wrap: wrap; }
.graph-legend .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--cp-text-muted); }
.graph-legend .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* Detail */
.detail-panel {
  background: var(--cp-surface); border: 1px solid var(--cp-border); border-radius: 16px;
  padding: 20px; margin-top: 16px; box-shadow: 0 0 2px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.14);
}
.detail-panel h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
.detail-row { display: flex; padding: 6px 0; border-bottom: 1px solid var(--cp-border); font-size: 13px; }
.detail-row:last-child { border-bottom: none; }
.detail-row .label { width: 140px; min-width: 140px; color: var(--cp-text-muted); font-weight: 500; }
.detail-row .value { flex: 1; word-break: break-word; }

/* Empty/Loading */
.empty-state { text-align: center; padding: 60px 20px; color: var(--cp-text-muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state h3 { font-size: 16px; margin-bottom: 4px; color: var(--cp-text); }
.empty-state p { font-size: 13px; }
.loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--cp-text-muted); font-size: 13px; gap: 8px; }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 16px; height: 16px; border: 2px solid var(--cp-border); border-top-color: var(--cp-accent); border-radius: 50%; animation: spin 0.6s linear infinite; }

/* Toast */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--cp-panel-strong); border: 1px solid var(--cp-border); border-radius: 0.625rem;
  padding: 10px 16px; font-size: 13px; box-shadow: var(--cp-shadow); animation: slideIn 0.2s ease-out;
}
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.theme-toggle { background: none; border: none; cursor: pointer; font-size: 18px; padding: 4px; color: var(--cp-text-muted); }

.concepts-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.facts-list { list-style: none; padding: 0; }
.facts-list li { padding: 4px 0; font-size: 13px; color: var(--cp-text-soft); }
.facts-list li::before { content: "•"; color: var(--cp-accent); margin-right: 8px; }
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>🧠 Agent Memory</h1>
      <div class="subtitle">Enterprise Edition</div>
    </div>
    <nav class="nav-section">
      <div class="nav-section-title">Overview</div>
      <button class="nav-item active" data-view="dashboard" onclick="switchView('dashboard')">
        <span class="icon">📊</span> Dashboard
      </button>
      <button class="nav-item" data-view="health" onclick="switchView('health')">
        <span class="icon">💚</span> Health
      </button>
    </nav>
    <nav class="nav-section">
      <div class="nav-section-title">Data</div>
      <button class="nav-item" data-view="sessions" onclick="switchView('sessions')">
        <span class="icon">📁</span> Sessions
        <span class="badge" id="badge-sessions">—</span>
      </button>
      <button class="nav-item" data-view="observations" onclick="switchView('observations')">
        <span class="icon">👁</span> Observations
      </button>
      <button class="nav-item" data-view="memories" onclick="switchView('memories')">
        <span class="icon">💡</span> Memories
        <span class="badge" id="badge-memories">—</span>
      </button>
    </nav>
    <nav class="nav-section">
      <div class="nav-section-title">Intelligence</div>
      <button class="nav-item" data-view="search" onclick="switchView('search')">
        <span class="icon">🔍</span> Search
      </button>
      <button class="nav-item" data-view="graph" onclick="switchView('graph')">
        <span class="icon">🕸️</span> Knowledge Graph
      </button>
    </nav>
    <div style="flex:1"></div>
    <div style="padding: 12px 16px; border-top: 1px solid var(--cp-border); display: flex; align-items: center; gap: 8px;">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌓</button>
      <span style="font-size: 11px; color: var(--cp-text-muted);">v0.2.0</span>
    </div>
  </aside>

  <main class="main">
    <div class="config-bar">
      <label>API:</label>
      <input type="text" id="api-url" value="" placeholder="http://localhost:8080" style="width: 240px;" onchange="updateApiUrl()">
      <label>Tenant:</label>
      <input type="text" id="tenant-id" value="default" style="width: 120px;" onchange="updateTenantId()">
      <div style="flex:1"></div>
      <span id="health-indicator"><span class="dot yellow"></span> Connecting...</span>
      <button class="btn" onclick="refreshCurrentView()">↻ Refresh</button>
    </div>

    <!-- Dashboard -->
    <div class="content" id="view-dashboard">
      <div class="stats-grid">
        <div class="stat-card"><div class="label">Sessions</div><div class="value" id="stat-sessions">—</div><div class="sub">Total sessions</div></div>
        <div class="stat-card"><div class="label">Observations</div><div class="value" id="stat-observations">—</div><div class="sub">Compressed &amp; indexed</div></div>
        <div class="stat-card"><div class="label">Memories</div><div class="value" id="stat-memories">—</div><div class="sub">Active memories</div></div>
        <div class="stat-card"><div class="label">Graph Nodes</div><div class="value" id="stat-nodes">—</div><div class="sub">Knowledge entities</div></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Recent Sessions</span></div>
        <div id="dashboard-sessions"></div>
      </div>
    </div>

    <!-- Health -->
    <div class="content" id="view-health" style="display:none"><div id="health-details"></div></div>

    <!-- Sessions -->
    <div class="content" id="view-sessions" style="display:none">
      <div id="sessions-table"></div>
      <div id="session-detail"></div>
    </div>

    <!-- Observations -->
    <div class="content" id="view-observations" style="display:none">
      <div style="margin-bottom:12px; display:flex; gap:8px; align-items:center;">
        <label style="font-size:13px; color:var(--cp-text-muted);">Session:</label>
        <select id="obs-session-select" onchange="loadObservations()" style="padding:6px 10px; border:1px solid var(--cp-border); border-radius:0.625rem; background:var(--cp-surface); color:var(--cp-text); font-size:13px; font-family:inherit; min-width:200px;"></select>
      </div>
      <div id="observations-list"></div>
      <div id="observation-detail"></div>
    </div>

    <!-- Memories -->
    <div class="content" id="view-memories" style="display:none">
      <div id="memories-list"></div>
      <div id="memory-detail"></div>
    </div>

    <!-- Search -->
    <div class="content" id="view-search" style="display:none">
      <div class="search-box">
        <input type="text" id="search-query" placeholder="Search observations &amp; memories..." onkeydown="if(event.key==='Enter')doSearch()">
        <select id="search-scope">
          <option value="all">All</option>
          <option value="observations">Observations</option>
          <option value="memories">Memories</option>
        </select>
        <button class="btn primary" onclick="doSearch()">🔍 Search</button>
      </div>
      <div id="search-results"></div>
    </div>

    <!-- Graph -->
    <div class="content" id="view-graph" style="display:none">
      <div style="display:flex; gap:8px; margin-bottom:12px; align-items:center;">
        <button class="btn primary" onclick="loadGraph()">Load Graph</button>
        <select id="graph-type-filter" style="padding:6px 10px; border:1px solid var(--cp-border); border-radius:0.625rem; background:var(--cp-surface); color:var(--cp-text); font-size:13px; font-family:inherit;">
          <option value="">All Types</option>
          <option value="file">Files</option>
          <option value="concept">Concepts</option>
          <option value="library">Libraries</option>
          <option value="function">Functions</option>
          <option value="person">People</option>
          <option value="error">Errors</option>
          <option value="pattern">Patterns</option>
          <option value="project">Projects</option>
        </select>
        <span style="font-size:12px; color:var(--cp-text-muted);" id="graph-info"></span>
      </div>
      <div class="graph-container">
        <canvas class="graph-canvas" id="graph-canvas"></canvas>
        <div class="graph-legend" id="graph-legend"></div>
      </div>
      <div id="graph-node-detail"></div>
    </div>
  </main>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
// ---- State ----
let API_URL = '';
let TENANT_ID = 'default';
let currentView = 'dashboard';

(function initApiUrl() {
  API_URL = window.location.origin;
  document.getElementById('api-url').value = API_URL;
})();

function updateApiUrl() {
  API_URL = document.getElementById('api-url').value.replace(/\/$/, '');
  checkHealth();
  refreshCurrentView();
}

function updateTenantId() {
  TENANT_ID = document.getElementById('tenant-id').value || 'default';
  refreshCurrentView();
}

// ---- API ----
// Phase 2: API-key gate. Read from same localStorage slot the savings dashboard uses.
function eamApiKey() {
  let k = localStorage.getItem('eam-api-key');
  if (!k) {
    k = prompt('Paste your eam-mcp API key (prefix is your name):');
    if (k) localStorage.setItem('eam-api-key', k.trim());
  }
  return k || '';
}
async function api(path, options = {}) {
  const url = `${API_URL}${path}`;
  const tenant = localStorage.getItem('eam-tenant') || TENANT_ID;
  const res = await fetch(url, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'x-tenant-id': tenant,
      'x-api-key': eamApiKey(),
      ...(options.headers || {}),
    },
  });
  if (res.status === 401) {
    localStorage.removeItem('eam-api-key');
    throw new Error('API key rejected — refresh and re-enter');
  }
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  return res.json();
}

// ---- Toast ----
function toast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.borderLeftColor = type === 'error' ? 'var(--cp-danger)' : 'var(--cp-success)';
  el.style.borderLeftWidth = '3px';
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ---- Theme ----
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
}

// ---- Navigation ----
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === view));
  document.querySelectorAll('.content').forEach(el => el.style.display = el.id === `view-${view}` ? '' : 'none');
  refreshCurrentView();
}

function refreshCurrentView() {
  const handlers = { dashboard: loadDashboard, health: loadHealth, sessions: loadSessions, observations: loadObservationSessions, memories: loadMemories, graph: loadGraph };
  if (handlers[currentView]) handlers[currentView]();
}

// ---- Health ----
async function checkHealth() {
  const indicator = document.getElementById('health-indicator');
  try {
    const res = await api('/api/v1/health');
    const status = res.data.status;
    const dot = status === 'healthy' ? 'green' : status === 'degraded' ? 'yellow' : 'red';
    indicator.innerHTML = `<span class="dot ${dot}"></span> ${status}`;
    return res.data;
  } catch (e) {
    indicator.innerHTML = `<span class="dot red"></span> Disconnected`;
    return null;
  }
}

async function loadHealth() {
  const container = document.getElementById('health-details');
  container.innerHTML = '<div class="loading"><div class="spinner"></div> Checking health...</div>';
  try {
    const res = await api('/api/v1/health');
    const d = res.data;
    container.innerHTML = `
      <div class="stats-grid">
        ${Object.entries(d.services).map(([name, status]) => `
          <div class="stat-card">
            <div class="label">${name}</div>

// ---- Knowledge Graph ----
const NODE_COLORS = {
  file: '#0078d4', concept: '#b11f4b', library: '#16a34a', function: '#8b5cf6',
  person: '#f59e0b', error: '#dc2626', pattern: '#06b6d4', project: '#8b5cf6',
  decision: '#f97316', preference: '#ec4899', organization: '#6366f1',
  location: '#14b8a6', event: '#a855f7',
};

let graphNodes = [], graphEdges = [];

async function loadGraph() {
  const typeFilter = document.getElementById('graph-type-filter').value;
  const info = document.getElementById('graph-info');
  try {
    const params = typeFilter ? `?type=${typeFilter}&limit=200` : '?limit=200';
    const [nodesRes, edgesRes] = await Promise.all([
      api(`/api/v1/graph/nodes${params}`),
      api('/api/v1/graph/edges?limit=500'),
    ]);
    graphNodes = nodesRes.data?.items || [];
    graphEdges = edgesRes.data?.items || [];
    info.textContent = `${graphNodes.length} nodes, ${graphEdges.length} edges`;
    renderGraph();
    renderGraphLegend();
  } catch (e) {
    info.textContent = `Error: ${e.message}`;
  }
}

function renderGraph() {
  const canvas = document.getElementById('graph-canvas');
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = 500;
  const W = canvas.width, H = canvas.height;

  if (!graphNodes.length) {
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--cp-text-muted');
    ctx.font = '14px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No graph data. Click "Load Graph" to fetch nodes.', W/2, H/2);
    return;
  }

  // Force-directed layout
  const positions = new Map(), velocities = new Map();
  graphNodes.forEach((n, i) => {
    const angle = (2 * Math.PI * i) / graphNodes.length;
    const r = Math.min(W, H) * 0.35;
    positions.set(n.id, { x: W/2 + r * Math.cos(angle), y: H/2 + r * Math.sin(angle) });
    velocities.set(n.id, { x: 0, y: 0 });
  });

  const nodeIds = new Set(graphNodes.map(n => n.id));
  const validEdges = graphEdges.filter(e => nodeIds.has(e.sourceNodeId) && nodeIds.has(e.targetNodeId));

  for (let iter = 0; iter < 100; iter++) {
    for (let i = 0; i < graphNodes.length; i++) {
      for (let j = i + 1; j < graphNodes.length; j++) {
        const a = positions.get(graphNodes[i].id), b = positions.get(graphNodes[j].id);
        let dx = b.x - a.x, dy = b.y - a.y;
        let dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const force = 5000 / (dist * dist);
        const fx = (dx / dist) * force, fy = (dy / dist) * force;
        velocities.get(graphNodes[i].id).x -= fx; velocities.get(graphNodes[i].id).y -= fy;
        velocities.get(graphNodes[j].id).x += fx; velocities.get(graphNodes[j].id).y += fy;
      }
    }
    for (const e of validEdges) {
      const a = positions.get(e.sourceNodeId), b = positions.get(e.targetNodeId);
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const force = (dist - 120) * 0.01;
      const fx = (dx / dist) * force, fy = (dy / dist) * force;
      velocities.get(e.sourceNodeId).x += fx; velocities.get(e.sourceNodeId).y += fy;
      velocities.get(e.targetNodeId).x -= fx; velocities.get(e.targetNodeId).y -= fy;
    }
    graphNodes.forEach(n => {
      const p = positions.get(n.id), v = velocities.get(n.id);
      v.x += (W/2 - p.x) * 0.001; v.y += (H/2 - p.y) * 0.001;
      p.x += v.x * 0.85; p.y += v.y * 0.85;
      v.x *= 0.9; v.y *= 0.9;
      p.x = Math.max(40, Math.min(W - 40, p.x));
      p.y = Math.max(40, Math.min(H - 40, p.y));
    });
  }

  ctx.clearRect(0, 0, W, H);

  // Edges
  for (const e of validEdges) {
    const a = positions.get(e.sourceNodeId), b = positions.get(e.targetNodeId);
    if (!a || !b) continue;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--cp-border-strong');
    ctx.lineWidth = Math.min(3, 0.5 + e.weight * 0.5);
    ctx.globalAlpha = 0.4; ctx.stroke(); ctx.globalAlpha = 1;
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    ctx.font = '9px "Segoe UI", sans-serif';
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--cp-text-muted');
    ctx.textAlign = 'center';
    ctx.fillText(e.type, mx, my - 4);
  }

  // Nodes
  for (const n of graphNodes) {
    const p = positions.get(n.id);
    const color = NODE_COLORS[n.type] || '#888';
    const r = 8 + Math.min(8, (n.sourceObservationIds?.length || 1) * 2);
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, 2 * Math.PI);
    ctx.fillStyle = color; ctx.globalAlpha = 0.85; ctx.fill(); ctx.globalAlpha = 1;
    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--cp-surface');
    ctx.lineWidth = 2; ctx.stroke();
    ctx.font = '11px "Segoe UI", sans-serif';
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--cp-text');
    ctx.textAlign = 'center';
    ctx.fillText(n.name.length > 20 ? n.name.slice(0,18) + '…' : n.name, p.x, p.y + r + 14);
  }

  canvas.onclick = function(evt) {
    const r = canvas.getBoundingClientRect();
    const mx = evt.clientX - r.left, my = evt.clientY - r.top;
    for (const n of graphNodes) {
      const p = positions.get(n.id);
      const dx = mx - p.x, dy = my - p.y;
      if (dx*dx + dy*dy < 400) { showGraphNodeDetail(n); return; }
    }
  };
}

function renderGraphLegend() {
  const types = [...new Set(graphNodes.map(n => n.type))].sort();
  document.getElementById('graph-legend').innerHTML = types.map(t =>
    `<div class="legend-item"><div class="legend-dot" style="background:${NODE_COLORS[t] || '#888'}"></div>${t}</div>`
  ).join('');
}

function showGraphNodeDetail(n) {
  const connectedEdges = graphEdges.filter(e => e.sourceNodeId === n.id || e.targetNodeId === n.id);
  const connected = connectedEdges.map(e => {
    const otherId = e.sourceNodeId === n.id ? e.targetNodeId : e.sourceNodeId;
    const other = graphNodes.find(gn => gn.id === otherId);
    return { edge: e, node: other, direction: e.sourceNodeId === n.id ? '→' : '←' };
  }).filter(c => c.node);

  document.getElementById('graph-node-detail').innerHTML = `
    <div class="detail-panel">
      <h3><span class="tag ${n.type}">${n.type}</span> ${esc(n.name)}</h3>
      <div class="detail-row"><div class="label">ID</div><div class="value mono">${n.id}</div></div>
      <div class="detail-row"><div class="label">Source Observations</div><div class="value">${n.sourceObservationIds?.length || 0}</div></div>
      <div class="detail-row"><div class="label">Created</div><div class="value">${new Date(n.createdAt).toLocaleString()}</div></div>
      ${connected.length ? `
        <div class="detail-row"><div class="label">Connections</div><div class="value">
          ${connected.map(c => `
            <div style="margin:2px 0; font-size:12px;">
              ${c.direction} <span class="tag ${c.node.type}">${c.node.type}</span> <strong>${esc(c.node.name)}</strong>
              <span style="color:var(--cp-text-muted);">(${c.edge.type}, weight: ${c.edge.weight})</span>
            </div>
          `).join('')}
        </div></div>
      ` : ''}
    </div>
  `;
}

// ---- Helpers ----
function esc(s) { if (!s) return ''; const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }

function timeAgo(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function importanceBar(v) {
  return `<div style="display:inline-flex; align-items:center; gap:4px;">
    <div style="width:60px; height:6px; background:var(--cp-surface-soft); border-radius:3px; overflow:hidden;">
      <div style="width:${(v||0)*10}%; height:100%; background:var(--cp-accent); border-radius:3px;"></div>
    </div><span style="font-size:11px; color:var(--cp-text-muted)">${v}</span></div>`;
}

function strengthBar(v) {
  return `<div style="display:inline-flex; align-items:center; gap:4px;">
    <div style="width:60px; height:6px; background:var(--cp-surface-soft); border-radius:3px; overflow:hidden;">
      <div style="width:${(v||0)*10}%; height:100%; background:var(--cp-success); border-radius:3px;"></div>
    </div><span style="font-size:11px; color:var(--cp-text-muted)">${v}</span></div>`;
}
